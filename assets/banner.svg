<svg id="fb" xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" role="img" aria-label="Henrique Monteiro — engenheiro de software, baixo nível" font-family="ui-monospace, 'Cascadia Mono', 'Segoe UI Mono', Consolas, 'SF Mono', Menlo, 'DejaVu Sans Mono', 'Liberation Mono', monospace" font-size="15" style="white-space:pre">
  <style>
    .fb-type { clip-path: inset(0 100% 0 0); animation: fb_type .9s steps(26, end) forwards; }
    .fb-t1 { animation-delay: .4s }
    .fb-t3 { animation-delay: 2.3s; animation-duration: 1.1s; }
    @keyframes fb_type { to { clip-path: inset(0 -5% 0 0) } }
    .fb-out { opacity: 0; animation: fb_in .01s steps(1) forwards; }
    .fb-o2 { animation-delay: 1.6s } .fb-o4 { animation-delay: 3.7s } .fb-o5 { animation-delay: 4s } .fb-o6 { animation-delay: 4.5s }
    .fb-cur { animation: fb_blink 1.1s steps(1) infinite; }
    @keyframes fb_blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
    @keyframes fb_in { to { opacity: 1 } }
    @media (prefers-reduced-motion: reduce) {
      #fb * { animation: none !important }
      #fb .fb-type { clip-path: none }
      #fb .fb-out { opacity: 1 }
    }
  </style>
  <rect width="880" height="290" fill="#16161e"/>
  <rect x="0.5" y="0.5" width="879" height="289" fill="none" stroke="#292e42"/>
  <rect x="1" y="1" width="878" height="36" fill="#1a1b26"/>
  <line x1="1" y1="37.5" x2="879" y2="37.5" stroke="#292e42"/>
  <circle cx="24" cy="19" r="5" fill="#3b4261"/>
  <circle cx="42" cy="19" r="5" fill="#3b4261"/>
  <circle cx="60" cy="19" r="5" fill="#3b4261"/>
  <text x="440" y="24" text-anchor="middle" fill="#565f89">henrique@kernel: ~</text>
  <text class="fb-type fb-t1" x="28" y="78"><tspan fill="#7aa2f7">henrique@kernel</tspan><tspan fill="#565f89">:~$ </tspan><tspan fill="#c0caf5">whoami</tspan></text>
  <text class="fb-out fb-o2" x="28" y="108"><tspan fill="#c0caf5">henrique monteiro</tspan><tspan fill="#a9b1d6"> — engenheiro de software</tspan></text>
  <text class="fb-type fb-t3" x="28" y="146"><tspan fill="#7aa2f7">henrique@kernel</tspan><tspan fill="#565f89">:~$ </tspan><tspan fill="#c0caf5">cat foco.txt</tspan></text>
  <text class="fb-out fb-o4" x="28" y="176"><tspan fill="#a9b1d6">baixo nível · </tspan><tspan fill="#bb9af7">engenharia reversa</tspan><tspan fill="#a9b1d6"> · </tspan><tspan fill="#bb9af7">drivers de kernel (WDK)</tspan></text>
  <text class="fb-out fb-o5" x="28" y="204" fill="#a9b1d6">full-stack: .NET · C# · React · TypeScript</text>
  <text class="fb-out fb-o6" x="28" y="248"><tspan fill="#7aa2f7">henrique@kernel</tspan><tspan fill="#565f89">:~$ </tspan><tspan class="fb-cur" fill="#c0caf5">▮</tspan></text>
</svg>